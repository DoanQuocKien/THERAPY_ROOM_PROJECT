<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 100 1600 760" role="img" aria-labelledby="title desc" font-family="Montserrat, Arial, sans-serif">
  <title id="title">Recommendation Algorithm Pipeline</title>
  <desc id="desc">A box-and-arrow pipeline for recommending a student psychological counseling room location at UIT.</desc>
  <defs>
    <style>
      text {
        font-family: "Montserrat", Arial, sans-serif;
        fill: #1f2937;
      }

      .box {
        rx: 8;
        ry: 8;
        stroke-width: 2.5;
      }

      .input-box {
        fill: #e0f2fe;
        stroke: #0284c7;
      }

      .process-box {
        fill: #eef2ff;
        stroke: #4f46e5;
      }

      .score-box {
        fill: #ecfdf5;
        stroke: #059669;
      }

      .output-box {
        fill: #fff7ed;
        stroke: #ea580c;
      }

      .group-box {
        fill: #ffffff;
        stroke: #86efac;
        stroke-width: 2;
        stroke-dasharray: 8 8;
      }

      .label {
        font-size: 22px;
        font-weight: 700;
      }

      .small {
        font-size: 17px;
        font-weight: 600;
        fill: #64748b;
      }

      .arrow {
        fill: none;
        stroke: #94a3b8;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .thin-arrow {
        fill: none;
        stroke: #94a3b8;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
    </style>
  </defs>

  <g id="inputs">
    <rect class="box input-box" x="100" y="160" width="300" height="92" rx="8" ry="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/>
    <text class="label" x="250" y="204" text-anchor="middle">Read D1</text>
    <text class="small" x="250" y="232" text-anchor="middle">weekly event list</text>

    <rect class="box input-box" x="100" y="292" width="300" height="92" rx="8" ry="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/>
    <text class="label" x="250" y="334" text-anchor="middle">Read D2</text>
    <text class="label" x="250" y="361" text-anchor="middle">UIT spatial graph</text>
    <text class="small" x="250" y="382" text-anchor="middle">G = (V, E)</text>

    <rect class="box input-box" x="100" y="424" width="300" height="92" rx="8" ry="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2.5"/>
    <text class="label" x="250" y="466" text-anchor="middle">Read D3</text>
    <text class="small" x="250" y="494" text-anchor="middle">candidate room list</text>
  </g>

  <g id="process">
    <rect class="box process-box" x="500" y="230" width="240" height="110" rx="8" ry="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5"/>
    <text class="label" x="620" y="276" text-anchor="middle">Sort</text>
    <text class="label" x="620" y="304" text-anchor="middle">events</text>
    <text class="small" x="620" y="328" text-anchor="middle">by day and period</text>

    <rect class="box process-box" x="840" y="230" width="240" height="110" rx="8" ry="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5"/>
    <text class="label" x="960" y="276" text-anchor="middle">Extract</text>
    <text class="label" x="960" y="304" text-anchor="middle">movements</text>
    <text class="small" x="960" y="328" text-anchor="middle">room-to-room pairs</text>

    <rect class="box process-box" x="1180" y="230" width="240" height="110" rx="8" ry="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5"/>
    <text class="label" x="1300" y="276" text-anchor="middle">Find shortest</text>
    <text class="label" x="1300" y="304" text-anchor="middle">paths</text>
    <text class="small" x="1300" y="328" text-anchor="middle">using Dijkstra</text>

    <rect class="box process-box" x="1180" y="470" width="240" height="110" rx="8" ry="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5"/>
    <text class="label" x="1300" y="516" text-anchor="middle">Aggregate</text>
    <text class="label" x="1300" y="544" text-anchor="middle">traffic</text>
    <text class="small" x="1300" y="568" text-anchor="middle">node, edge, access-node</text>

    <rect class="group-box" x="812" y="438" width="296" height="214" rx="10" ry="10" fill="#ffffff" stroke="#86efac" stroke-width="2" stroke-dasharray="8 8"/>
    <text class="label" x="960" y="478" text-anchor="middle">Compute</text>
    <text class="label" x="960" y="506" text-anchor="middle">candidate scores</text>

    <rect class="box score-box" x="844" y="520" width="232" height="38" rx="8" ry="8" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/>
    <text class="small" x="960" y="545" text-anchor="middle">Accessibility indicator</text>

    <rect class="box score-box" x="844" y="570" width="232" height="38" rx="8" ry="8" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/>
    <text class="small" x="960" y="595" text-anchor="middle">Visibility indicator</text>

    <rect class="box score-box" x="844" y="620" width="232" height="38" rx="8" ry="8" fill="#ecfdf5" stroke="#059669" stroke-width="2.5"/>
    <text class="small" x="960" y="645" text-anchor="middle">Privacy indicator</text>

    <rect class="box process-box" x="500" y="494" width="240" height="110" rx="8" ry="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5"/>
    <text class="label" x="620" y="540" text-anchor="middle">Normalize</text>
    <text class="label" x="620" y="568" text-anchor="middle">indicators</text>
    <text class="small" x="620" y="592" text-anchor="middle">to the same scale</text>

    <rect class="box process-box" x="500" y="690" width="240" height="110" rx="8" ry="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5"/>
    <text class="label" x="620" y="736" text-anchor="middle">Compute final</text>
    <text class="label" x="620" y="764" text-anchor="middle">score</text>
    <text class="small" x="620" y="788" text-anchor="middle">weighted trade-off</text>

    <rect class="box process-box" x="840" y="690" width="240" height="110" rx="8" ry="8" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5"/>
    <text class="label" x="960" y="736" text-anchor="middle">Rank</text>
    <text class="label" x="960" y="764" text-anchor="middle">candidate rooms</text>
    <text class="small" x="960" y="788" text-anchor="middle">primary and alternatives</text>
  </g>

  <g id="output">
    <rect class="box output-box" x="1180" y="674" width="300" height="142" rx="8" ry="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5"/>
    <text class="label" x="1330" y="714" text-anchor="middle">Generate</text>
    <text class="label" x="1330" y="742" text-anchor="middle">output</text>
    <text class="small" x="1330" y="770" text-anchor="middle">primary, alternatives</text>
    <text class="small" x="1330" y="796" text-anchor="middle">rooms, trade-off reports</text>
  </g>

  <path class="thin-arrow" d="M 400 206 H 452 Q 472 206 472 226 V 276 Q 472 286 490 286" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="thin-arrow" d="M 400 338 H 452 Q 472 338 472 318 V 294 Q 472 286 490 286" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="thin-arrow" d="M 400 470 H 452 Q 472 470 472 422 V 300 Q 472 286 490 286" fill="none" stroke="#94a3b8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <path class="arrow" d="M 740 285 H 828" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="arrow" d="M 1080 285 H 1168" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="arrow" d="M 1300 340 V 458" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="arrow" d="M 1180 525 H 1120 Q 1096 525 1096 549 H 1078" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="arrow" d="M 812 549 H 752" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="arrow" d="M 620 604 V 678" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="arrow" d="M 740 745 H 828" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path class="arrow" d="M 1080 745 H 1168" fill="none" stroke="#94a3b8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g id="arrowheads" fill="#94a3b8">
    <path d="M 490 286 L 478 280 L 478 292 Z"/>
    <path d="M 828 285 L 816 279 L 816 291 Z"/>
    <path d="M 1168 285 L 1156 279 L 1156 291 Z"/>
    <path d="M 1300 458 L 1294 446 L 1306 446 Z"/>
    <path d="M 1078 549 L 1090 543 L 1090 555 Z"/>
    <path d="M 752 549 L 764 543 L 764 555 Z"/>
    <path d="M 620 678 L 614 666 L 626 666 Z"/>
    <path d="M 828 745 L 816 739 L 816 751 Z"/>
    <path d="M 1168 745 L 1156 739 L 1156 751 Z"/>
  </g>
</svg>
